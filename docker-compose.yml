version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: localspotify-mysql
    environment:
      MYSQL_DATABASE: local_spotify_db
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  app:
    build: .
    container_name: localspotify-app
    ports:
      - "8080:8080"
    environment:
      # Đã bổ sung ngoặc kép và các tham số chống lỗi font/múi giờ
      MYSQL_URL: "jdbc:mysql://db:3306/local_spotify_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8"
      MYSQLUSER: root
      MYSQLPASSWORD: rootpassword123
      UPLOAD_DIR: /app/uploads
    depends_on:
      - db
    volumes:
      - app_uploads:/app/uploads
    restart: unless-stopped

volumes:
  db_data:
  app_uploads: